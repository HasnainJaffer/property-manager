<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PropFlow — Redesign Explorations</title>
  <style>
    html, body { margin: 0; height: 100%; background: #f0eee9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    iframe { border: 0; display: block; width: 100%; height: 100%; background: #07090f; }
    .legend { font-size: 12px; color: rgba(40,30,20,0.7); line-height: 1.5; }
    .legend strong { color: rgba(40,30,20,0.9); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>

  <script type="text/babel">
    const ART_W = 1480;
    const ART_H = 940;

    function PropFlowCanvas() {
      return (
        <DesignCanvas title="PropFlow · Dashboard redesign"
                      subtitle="Two glassmorphic directions, fully clickable. Use the sidebar to navigate; theme + density live in the Tweaks panel.">
          <DCSection id="overview"
                     title="Two directions"
                     subtitle="Crystal — cool indigo glass, fintech tone.  ·  Atlas — warm editorial glass, serif accents.">
            <DCArtboard id="crystal" label="A · Crystal — cool indigo glass" width={ART_W} height={ART_H}>
              <iframe src="crystal/index.html" title="Crystal" />
            </DCArtboard>
            <DCArtboard id="atlas" label="B · Atlas — warm editorial glass" width={ART_W} height={ART_H}>
              <iframe src="atlas/index.html" title="Atlas" />
            </DCArtboard>
          </DCSection>

          <DCPostIt top={40} left={40} width={280}>
            <strong>How to read this canvas</strong><br/>
            Each artboard is a full clickable prototype — click sidebar items to navigate between screens. Toggle the <strong>Tweaks</strong> button in the toolbar to swap theme (light / dark) and density. Double-click any artboard label to focus it fullscreen.
          </DCPostIt>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<PropFlowCanvas />);
  </script>
</body>
</html>
